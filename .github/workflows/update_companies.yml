name: Daily Company News Check

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run company news check
        run: python scripts/update_companies.py

      - name: Commit updates if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/updates.json
          git diff --staged --quiet || (git commit -m "Auto: flag company news updates [$(date +'%Y-%m-%d')]" && git push)
